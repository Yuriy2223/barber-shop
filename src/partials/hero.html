<section
  id="about"
  class="flex"
  style="height: 100svh; min-height: 580px; max-height: 900px"
  aria-label="Головна секція — BarberShop"
>
  <aside
    class="hidden md:flex flex-col items-center bg-white shrink-0 w-[13%] pb-12"
    aria-label="Соціальні мережі"
  >
    <div class="flex-1"></div>

    <div class="flex flex-col items-center gap-6">
      <a
        href="https://youtube.com"
        target="_blank"
        rel="noopener noreferrer"
        class="group relative text-black/40 hover:text-[#E8A045] transition-colors duration-300 text-[10px] font-medium tracking-[0.25em] uppercase"
        style="writing-mode: vertical-rl; transform: rotate(180deg)"
        aria-label="YouTube канал"
      >
        Youtube
        <span
          class="absolute -left-2 top-0 h-full w-px scale-y-0 group-hover:scale-y-100 bg-[#E8A045] transition-transform duration-300 origin-bottom"
          aria-hidden="true"
        ></span>
      </a>

      <a
        href="https://instagram.com"
        target="_blank"
        rel="noopener noreferrer"
        class="group relative text-black/40 hover:text-[#E8A045] transition-colors duration-300 text-[10px] font-medium tracking-[0.25em] uppercase"
        style="writing-mode: vertical-rl; transform: rotate(180deg)"
        aria-label="Instagram"
      >
        Instagram
        <span
          class="absolute -left-2 top-0 h-full w-px scale-y-0 group-hover:scale-y-100 bg-[#E8A045] transition-transform duration-300 origin-bottom"
          aria-hidden="true"
        ></span>
      </a>
      >
      <div class="w-px bg-black/20 h-16"></div>
    </div>
  </aside>

  <div class="relative flex-1 overflow-hidden">
    <div
      id="hero-slider"
      class="absolute inset-0 flex transition-transform duration-700 ease-in-out"
      aria-live="polite"
      aria-atomic="true"
    >
      <div
        class="hero-slide relative w-full h-full shrink-0"
        aria-label="Слайд 1 з 3"
      >
        <picture>
          <source
            media="(min-width: 1170px)"
            srcset="/hero-des-1.jpg"
            width="1070"
            height="680"
          />
          <source
            media="(min-width: 768px)"
            srcset="/hero-tab-1.jpg"
            width="1024"
            height="768"
          />
          <img
            src="/hero-mob-1.jpg"
            alt="Барбер виконує стрижку — BarberShop Kyiv"
            class="w-full h-full object-cover object-center"
            width="640"
            height="960"
            fetchpriority="high"
            decoding="async"
          />
        </picture>
        <div
          class="absolute inset-0 bg-linear-to-r from-black/85 via-black/50 to-black/15"
        ></div>
        <div
          class="absolute inset-0 bg-linear-to-t from-black/70 via-transparent to-black/25"
        ></div>
      </div>

      <div
        class="hero-slide relative w-full h-full shrink-0"
        aria-label="Слайд 2 з 3"
      >
        <picture>
          <source
            media="(min-width: 1170px)"
            srcset="/hero-des-2.jpg"
            width="1070"
            height="680"
          />
          <source
            media="(min-width: 768px)"
            srcset="/hero-tab-2.jpg"
            width="1024"
            height="768"
          />
          <img
            src="/hero-mob-2.jpg"
            alt="Чоловіча стрижка у барбершопі Київ"
            class="w-full h-full object-cover object-center"
            width="640"
            height="960"
            decoding="async"
          />
        </picture>
        <div
          class="absolute inset-0 bg-linear-to-r from-black/85 via-black/50 to-black/15"
        ></div>
        <div
          class="absolute inset-0 bg-linear-to-t from-black/70 via-transparent to-black/25"
        ></div>
      </div>

      <div
        class="hero-slide relative w-full h-full shrink-0"
        aria-label="Слайд 3 з 3"
      >
        <picture>
          <source
            media="(min-width: 1170px)"
            srcset="/hero-des-3.jpg"
            width="1070"
            height="680"
          />
          <source
            media="(min-width: 768px)"
            srcset="/hero-tab-3.jpg"
            width="1024"
            height="768"
          />
          <img
            src="/hero-mob-3.jpg"
            alt="Майстер та клієнт — BarberShop Kyiv"
            class="w-full h-full object-cover object-center"
            width="640"
            height="960"
            decoding="async"
          />
        </picture>
        <div
          class="absolute inset-0 bg-linear-to-r from-black/85 via-black/50 to-black/15"
        ></div>
        <div
          class="absolute inset-0 bg-linear-to-t from-black/70 via-transparent to-black/25"
        ></div>
      </div>
    </div>

    <div
      class="relative z-10 flex flex-col justify-center h-full px-6 sm:px-10 lg:px-16"
    >
      <div class="max-w-xl">
        <p
          class="flex items-center gap-3 text-white/60 text-[11px] font-medium tracking-[0.25em] uppercase mb-5 hero-eyebrow"
        >
          <span
            class="inline-block w-10 h-px bg-white/40 shrink-0"
            aria-hidden="true"
          ></span>
          <span>A hair salon for men in Kyiv</span>
        </p>

        <h1
          class="text-white font-extrabold leading-none tracking-tight mb-6 hero-headline"
          style="font-size: clamp(3rem, 8vw, 5.5rem)"
        >
          BarberShop
        </h1>

        <p
          class="text-white/80 text-base sm:text-lg leading-relaxed font-light max-w-xs sm:max-w-sm hero-tagline"
        >
          We are experts in trendy men's haircuts.<br />
          We work quickly, carefully and with style.
        </p>
      </div>
    </div>

    <nav
      class="absolute bottom-8 right-8 sm:right-12 lg:right-16 flex items-end gap-10 z-10"
      aria-label="Навігація слайдів"
    >
      <button
        id="hero-prev"
        class="flex flex-col items-center gap-2 group"
        aria-label="Попередній слайд"
        type="button"
      >
        <span
          class="text-white/40 group-hover:text-white transition-colors duration-200 text-sm font-medium tracking-wide"
          >Back</span
        >
        <span
          class="w-28 h-px bg-white/25 group-hover:bg-white/50 transition-colors duration-200"
          aria-hidden="true"
        ></span>
      </button>

      <button
        id="hero-next"
        class="flex flex-col items-center gap-2 group"
        aria-label="Наступний слайд"
        type="button"
      >
        <span
          class="text-white group-hover:text-[#E8A045] transition-colors duration-200 text-sm font-semibold tracking-wide"
          >Forward</span
        >
        <span
          class="w-28 h-px bg-white group-hover:bg-[#E8A045] transition-colors duration-200"
          aria-hidden="true"
        ></span>
      </button>
    </nav>

    <div
      id="hero-dots"
      class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col items-end gap-3 z-10"
      role="tablist"
      aria-label="Слайди"
    >
      <button
        role="tab"
        aria-selected="true"
        data-dot="0"
        class="hero-dot block h-0.5 bg-white w-8 transition-all duration-300"
        aria-label="Слайд 1"
      ></button>
      <button
        role="tab"
        aria-selected="false"
        data-dot="1"
        class="hero-dot block h-0.5 bg-white/40 w-5 transition-all duration-300"
        aria-label="Слайд 2"
      ></button>
      <button
        role="tab"
        aria-selected="false"
        data-dot="2"
        class="hero-dot block h-0.5 bg-white/40 w-5 transition-all duration-300"
        aria-label="Слайд 3"
      ></button>
    </div>
  </div>
</section>
