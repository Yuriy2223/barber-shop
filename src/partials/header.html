<header
  id="site-header"
  role="banner"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  aria-label="Main site navigation"
>
  <div
    class="container mx-auto max-w-7xl flex items-center justify-between px-6 py-4 lg:px-10 lg:py-6"
  >
    <a
      href="#hero"
      aria-label="BarberShop — men's barbershop"
      title="Barber Shop"
    >
      <picture>
        <source
          id="header-logo-source"
          media="(min-width: 768px)"
          srcset="/logo-dark.svg"
          width="69"
          height="56"
        />
        <img
          id="header-logo"
          src="/logo-light.svg"
          alt="BarberShop"
          width="69"
          height="56"
          decoding="async"
        />
      </picture>
    </a>

    <nav
      id="desktop-nav"
      class="hidden lg:flex items-center justify-between w-[40%]"
      aria-label="Main menu"
    >
      <a
        href="#about"
        class="nav-link text-white/80 text-base font-medium tracking-wide hover:text-white transition-colors relative group"
      >
        About
        <span
          class="absolute -bottom-1 left-0 w-0 h-px bg-[#E8A045] group-hover:w-full transition-all duration-300"
          aria-hidden="true"
        ></span>
      </a>
      <a
        href="#services"
        class="nav-link text-white/80 text-base font-medium tracking-wide hover:text-white transition-colors relative group"
      >
        Services
        <span
          class="absolute -bottom-1 left-0 w-0 h-px bg-[#E8A045] group-hover:w-full transition-all duration-300"
          aria-hidden="true"
        ></span>
      </a>
      <a
        href="#stats"
        class="nav-link text-white/80 text-base font-medium tracking-wide hover:text-white transition-colors relative group"
      >
        Stats
        <span
          class="absolute -bottom-1 left-0 w-0 h-px bg-[#E8A045] group-hover:w-full transition-all duration-300"
          aria-hidden="true"
        ></span>
      </a>
      <a
        href="#barbers"
        class="nav-link text-white/80 text-base font-medium tracking-wide hover:text-white transition-colors relative group"
      >
        Barbers
        <span
          class="absolute -bottom-1 left-0 w-0 h-px bg-[#E8A045] group-hover:w-full transition-all duration-300"
          aria-hidden="true"
        ></span>
      </a>
      <a
        href="#booking"
        class="nav-link text-white/80 text-base font-medium tracking-wide hover:text-white transition-colors relative group"
      >
        Contacts
        <span
          class="absolute -bottom-1 left-0 w-0 h-px bg-[#E8A045] group-hover:w-full transition-all duration-300"
          aria-hidden="true"
        ></span>
      </a>
    </nav>

    <div class="hidden lg:flex items-center gap-10">
      <a
        href="tel:+380441111111"
        class="text-white/90 text-sm font-medium tracking-wide hover:text-[#E8A045] transition-colors"
        aria-label="Call us: +38 044 111 11 11"
      >
        +38 044 111 11 11
      </a>
      <a
        href="#booking"
        class="border border-[#E8A045] text-[#E8A045] text-sm font-medium tracking-[0.15em] uppercase px-5 py-2.5 rounded-full hover:bg-[#E8A045] hover:text-white transition-all duration-300"
        role="button"
        aria-label="Online appointment to the barber"
      >
        Online-Booking
      </a>
    </div>

    <button
      id="mobile-menu-toggle"
      class="lg:hidden flex flex-col justify-center items-end w-10 h-10 gap-1.5 z-50"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="mobile-menu"
      type="button"
    >
      <span class="block w-6 h-0.5 bg-white transition-all duration-300"></span>
      <span class="block w-4 h-0.5 bg-white transition-all duration-300"></span>
      <span class="block w-6 h-0.5 bg-white transition-all duration-300"></span>
    </button>
  </div>
</header>

<div
  id="mobile-menu"
  role="dialog"
  aria-modal="true"
  aria-label="Mobile Navigation Menu"
  class="fixed inset-y-0 right-0 z-60 w-full max-w-106.25 bg-black/95 backdrop-blur-sm translate-x-full transition-transform duration-500 ease-in-out flex flex-col px-8 pt-6 pb-10 overflow-y-auto"
>
  <div class="flex justify-end mb-12">
    <button
      id="mobile-menu-close"
      class="text-white hover:text-[#E8A045] transition-colors"
      aria-label="Close menu"
      type="button"
    >
      <svg
        width="36"
        height="36"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        aria-hidden="true"
      >
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </div>
  <nav aria-label="Mobile Menu">
    <ul class="flex flex-col gap-4" role="list">
      <li>
        <a
          href="#about"
          class="mobile-nav-link block py-3 text-white text-xl font-medium tracking-wide border-b border-white/10 hover:text-[#E8A045] transition-colors"
          >About</a
        >
      </li>
      <li>
        <a
          href="#services"
          class="mobile-nav-link block py-3 text-white text-xl font-medium tracking-wide border-b border-white/10 hover:text-[#E8A045] transition-colors"
          >Services</a
        >
      </li>
      <li>
        <a
          href="#stats"
          class="mobile-nav-link block py-3 text-white text-xl font-medium tracking-wide border-b border-white/10 hover:text-[#E8A045] transition-colors"
          >Stats</a
        >
      </li>
      <li>
        <a
          href="#barbers"
          class="mobile-nav-link block py-3 text-white text-xl font-medium tracking-wide border-b border-white/10 hover:text-[#E8A045] transition-colors"
          >Barbers</a
        >
      </li>
      <li>
        <a
          href="#booking"
          class="mobile-nav-link block py-3 text-white text-xl font-medium tracking-wide border-b border-white/10 hover:text-[#E8A045] transition-colors"
          >Contacts</a
        >
      </li>
    </ul>
  </nav>
  <div class="flex flex-col items-center gap-6 mt-8">
    <a
      href="tel:+380441111111"
      class="text-white text-lg font-medium hover:text-[#E8A045] transition-colors"
      >+38 044 111 11 11</a
    >
    <a
      href="#booking"
      class="border border-[#E8A045] text-[#E8A045] text-sm font-semibold tracking-[0.12em] uppercase px-6 py-3 rounded-full hover:bg-[#E8A045] hover:text-white transition-all duration-300"
      role="button"
      >Online-Booking</a
    >
    <a
      href="https://youtube.com"
      target="_blank"
      rel="noopener noreferrer"
      class="group relative text-white hover:text-[#E8A045] transition-colors duration-300 text-[10px] font-medium tracking-[0.25em] uppercase"
      aria-label="YouTube channel"
    >
      Youtube
      <span
        class="absolute -left-2 top-0 h-full w-px scale-y-0 group-hover:scale-y-100 bg-[#E8A045] transition-transform duration-300 origin-bottom"
        aria-hidden="true"
      ></span>
    </a>

    <a
      href="https://instagram.com"
      target="_blank"
      rel="noopener noreferrer"
      class="group relative text-white hover:text-[#E8A045] transition-colors duration-300 text-[10px] font-medium tracking-[0.25em] uppercase"
      aria-label="Instagram"
    >
      Instagram
      <span
        class="absolute -left-2 top-0 h-full w-px scale-y-0 group-hover:scale-y-100 bg-[#E8A045] transition-transform duration-300 origin-bottom"
        aria-hidden="true"
      ></span>
    </a>
    <a
      href="https://facebook.com"
      target="_blank"
      rel="noopener noreferrer"
      class="group relative text-white hover:text-[#E8A045] transition-colors duration-300 text-[10px] font-medium tracking-[0.25em] uppercase"
      aria-label="Facebook"
    >
      Facebook
      <span
        class="absolute -left-2 top-0 h-full w-px scale-y-0 group-hover:scale-y-100 bg-[#E8A045] transition-transform duration-300 origin-bottom"
        aria-hidden="true"
      ></span>
    </a>
  </div>
</div>
