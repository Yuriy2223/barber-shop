<section
  id="booking"
  class="bg-[#191C26]"
  aria-label="Online registration and contacts"
>
  <div class="container mx-auto max-w-7xl">
    <div class="flex flex-col lg:flex-row lg:items-start">
      <div class="w-full lg:w-1/2 px-10 py-20 md:py-25">
        <h2
          class="text-[42px] font-bold text-white leading-[1.17] tracking-[0.05em] mb-11 text-center lg:text-left reveal-up"
          data-reveal
        >
          Online-booking
        </h2>

        <form
          id="booking-form"
          class="flex flex-col gap-6 reveal-right"
          novalidate
          data-reveal
        >
          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-1 relative pb-5">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="NAME*"
                autocomplete="name"
                class="w-full bg-transparent border-b border-white/40 pb-2 text-white placeholder:text-white/40 placeholder:text-[11px] placeholder:font-semibold placeholder:tracking-widest hover:border-white/60 focus:border-white focus:outline-none transition-colors"
              />
              <span
                id="name-error"
                class="absolute left-0 top-[80%] text-[#E8A045] text-[10px] font-semibold tracking-wider hidden"
                role="alert"
                aria-live="polite"
              ></span>
            </div>

            <div class="flex-1 relative pb-5">
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="PHONE*"
                autocomplete="tel"
                class="w-full bg-transparent border-b border-white/40 pb-2 text-white placeholder:text-white/40 placeholder:text-[11px] placeholder:font-semibold placeholder:tracking-widest hover:border-white/60 focus:border-white focus:outline-none transition-colors"
              />
              <span
                id="phone-error"
                class="absolute left-0 top-[80%] text-[#E8A045] text-[10px] font-semibold tracking-wider hidden"
                role="alert"
                aria-live="polite"
              ></span>
            </div>
          </div>

          <div class="relative pb-5">
            <textarea
              id="message"
              name="message"
              placeholder="MESSAGE*"
              rows="4"
              class="w-full bg-transparent border-b border-white/40 pb text-white placeholder:text-white/40 placeholder:text-[11px] placeholder:font-semibold placeholder:tracking-widest hover:border-white/60 focus:border-white focus:outline-none transition-colors resize-none"
            ></textarea>
            <span
              id="message-error"
              class="absolute left-0 top-[86%] text-[#E8A045] text-[10px] font-semibold tracking-wider hidden"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="relative flex justify-center lg:justify-start">
            <p
              id="form-success"
              class="absolute -top-6 left-0 text-green-400 text-[11px] font-semibold tracking-widest hidden"
              role="status"
              aria-live="polite"
            >
              ✓ YOUR REQUEST HAS BEEN SENT
            </p>

            <button
              type="submit"
              class="border border-[#E8A045] text-white text-xs font-semibold tracking-[0.09em] uppercase px-18 py-4 rounded-full hover:bg-[#E8A045] transition-all duration-300"
            >
              Send
            </button>
          </div>
        </form>
      </div>

      <div
        class="w-full lg:w-1/2 relative bg-[url('/contacts-mob.png')] md:bg-[url('/contacts-tab.png')] lg:bg-[url('/contacts-des.png')] bg-cover bg-center px-10 py-20 md:py-25 lg:pb-50"
      >
        <h2
          class="text-[42px] font-bold text-white leading-[1.17] tracking-[0.05em] mb-11 text-center lg:text-left"
        >
          Contacts
        </h2>

        <div
          class="flex flex-col md:flex-row md:justify-between reveal-left"
          data-reveal
        >
          <div class="flex flex-col gap-8 flex-1">
            <address class="not-italic">
              <a
                href="https://maps.google.com"
                target="_blank"
                rel="noopener noreferrer"
                class="flex items-start gap-4 text-[#9DA4BD] text-lg font-normal hover:text-[#E8A045] transition-colors duration-300"
              >
                <svg
                  class="w-6 h-6 shrink-0 mt-1"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
                <span>st. Ukrainska, 6<br />Kiev, 04112</span>
              </a>
            </address>

            <a
              href="tel:+380441111111"
              class="flex items-center gap-4 text-[#9DA4BD] text-lg font-normal hover:text-[#E8A045] transition-colors duration-300"
            >
              <svg
                class="w-6 h-6 shrink-0"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                />
              </svg>
              <span>+38 044 111 11 11</span>
            </a>

            <a
              href="mailto:barbershop@email.com"
              class="flex items-center gap-4 text-[#9DA4BD] text-lg font-normal hover:text-[#E8A045] transition-colors duration-300"
            >
              <svg
                class="w-6 h-6 shrink-0"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                />
              </svg>
              <span>barbershop@email.com</span>
            </a>
          </div>

          <div class="flex flex-col justify-center mt-8 md:mt-0">
            <div class="flex items-center gap-4 mb-5">
              <span class="block w-15 h-px bg-white/70"></span>
              <p
                class="text-white/70 text-[12px] font-semibold tracking-widest uppercase"
              >
                Working hours
              </p>
            </div>
            <p class="text-[#9DA4BD] text-lg font-normal">
              Every day from 9:00 to 22:00
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
